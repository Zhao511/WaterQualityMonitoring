/*********************************************************************
 * STM32F103 Flash Unlock Script for CMSIS-DAP (DAPMini)
 *
 * Usage: Project -> Options -> Debug -> CMSIS-DAP Settings ->
 *        Flash Download -> Init File -> browse to this file
 *
 * This script unlocks read-protected STM32F103 flash before download.
 *********************************************************************/

FUNC void UnlockTarget(void) {
    unsigned long val;

    /* Access level 3 is required for debug unlock */
    _WDWORD(0xE000EDF0, 0xA05F0003);   /* DHCSR: enable debug, halt core */

    /* Unlock Flash Controller (FLASH_CTRL key sequence) */
    _WDWORD(0x40022004, 0x45670123);   /* FLASH_KEYR = key1 */
    _WDWORD(0x40022004, 0xCDEF89AB);   /* FLASH_KEYR = key2 */

    /* Unlock Option Bytes */
    _WDWORD(0x40022008, 0x45670123);   /* FLASH_OPTKEYR = key1 */
    _WDWORD(0x40022008, 0xCDEF89AB);   /* FLASH_OPTKEYR = key2 */

    /* Wait for flash to be ready */
    while ((_RDWORD(0x4002200C) & 0x20) == 0);  /* poll FLASH_SR.BSY */

    /* Clear the read protection (set RDP to 0xA5) — triggers Mass Erase */
    _WDWORD(0x40022010, 0x000000A5);   /* FLASH_CR = OPTER | value */

    /* Start Option Byte Erase */
    _WDWORD(0x40022010, 0x000002A5);   /* FLASH_CR = STRT | OPTER */

    /* Wait for BSY to clear */
    while ((_RDWORD(0x4002200C) & 0x01) == 1);  /* poll FLASH_SR.BSY */

    printf("Flash unlocked and mass erased.\n");
}

/* Run unlock on debug start */
UnlockTarget();
